<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Placement Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 50%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
    }
    .login-logo {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a56db;
    }
    .login-subtitle {
      color: #6b7280;
      font-size: 0.95rem;
    }
    .form-label {
      font-weight: 600;
      color: #374151;
      font-size: 0.9rem;
    }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e5e7eb;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .btn-login {
      background: linear-gradient(135deg, #1a56db, #1e3a8a);
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,86,219,0.35);
    }
    .alert {
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
    }
    .divider {
      border-top: 1px solid #f3f4f6;
      margin: 1.5rem 0;
    }
    .info-box {
      background: #eff6ff;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: #1e40af;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="login-card mx-auto">

        <!-- Logo & Title -->
        <div class="text-center mb-4">
          <div class="login-logo">🎓</div>
          <h1 class="login-title">Placement Portal</h1>
          <p class="login-subtitle">Sign in to your account</p>
        </div>

        <!-- Error Message -->
        {% if error %}
        <div class="alert alert-danger mb-3">
          <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-envelope me-1"></i> Email Address
            </label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="your@email.com"
              required
              autofocus
            >
          </div>

          <div class="mb-4">
            <label class="form-label">
              <i class="bi bi-lock me-1"></i> Password
            </label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              required
            >
          </div>

          <button type="submit" class="btn btn-login btn-primary w-100 text-white">
            <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
          </button>

        </form>

        <!-- Info Box -->
        <div class="divider"></div>
        <div class="info-box text-center">
          <i class="bi bi-info-circle me-1"></i>
          Contact your TPO / Admin if you forgot your password.
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
