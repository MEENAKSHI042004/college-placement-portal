{% extends 'base.html' %}
{% block title %}Add Skill{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4">Add Skill</h4>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3"><label class="form-label">Skill Name</label>{{ form.skill_name }}</div>
          <div class="mb-3"><label class="form-label">Proficiency</label>{{ form.proficiency }}</div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-info text-white">Add Skill</button>
            <a href="{% url 'students:my_profile' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
