{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4">{{ title }}</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Company Name *</label>{{ form.name }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Industry *</label>{{ form.industry }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Website</label>{{ form.website }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Location</label>{{ form.location }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>{{ form.description }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Logo</label>{{ form.logo }}
          </div>
          <div class="mb-4 form-check">
            {{ form.is_active }}
            <label class="form-check-label ms-2">Mark as Active</label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Save Company</button>
            <a href="{% url 'companies:company_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
